<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="./style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&display=swap" rel="stylesheet">
  <title>Додати товар</title>
</head>
<body>
<header>
  <div class="header">
    <div class="menu">
      <a href="./index.html" class="button">Menu</a>
    </div>
    <div class="container">
      <div class="site_name"><a href="./index.html">BadPhone</a></div>
    </div>
    <div id="clock" class="clock">
      <script src="./clock.js"></script>
    </div>
  </div>
</header>

<main>
  <div class="left_side">
    <a class="vnesty">Внести товар</a>
    <div class="form">
      <form id="dataForm">
        <div class="form-row">
          <label for="category">Категорія:</label>
          <input type="text" id="category" name="category" required>
        </div>

        <div class="form-row">
          <label for="itemname">Найменування:</label>
          <input type="text" id="itemname" name="itemname" required>
        </div>

        <div class="form-row">
          <label for="shtrihcode">Штрихкод:</label>
          <input type="number" id="shtrihcode" name="shtrihcode" required>
        </div>

        <div class="form-row">
          <label for="buy_price">Ціна закупки:</label>
          <input type="number" id="buy_price" name="buy_price" required>
        </div>

        <div class="form-row">
          <label for="sale_price">Ціна продажу:</label>
          <input type="number" id="sale_price" name="sale_price" required>
        </div>

        <div class="form-row">
          <label for="quantity">Кількість:</label>
          <input type="number" id="quantity" name="quantity" required>
        </div>
      </form>

      <div class="message_status">
        <p id="status"></p>
      </div>
    </div>
  </div>
</main>
</body>
</html>
